services:

  mysql:
    image: mysql:8.0.46
    container_name: patria-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "3306:3306"
    networks:
      - patria-net

  scrap-diputados:
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./scrap_diputados_service/Dockerfile
    container_name: patria-scrap-diputados
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://patria-mysql:3306/ms_scrap_diputados
      SPRING_DATASOURCE_USERNAME: user_scrap_diputados
      SPRING_DATASOURCE_PASSWORD: ms.SDiputados.1
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - patria-net

  scrap-locations:
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./scrap_locations_service/Dockerfile
    container_name: patria-scrap-locations
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://patria-mysql:3306/ms_scrap_locations
      SPRING_DATASOURCE_USERNAME: user_scrap_locations
      SPRING_DATASOURCE_PASSWORD: ms.SLocations.1
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - patria-net

  diputado-profile:
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./diputado_profile_service/Dockerfile
    container_name: patria-diputado-profile
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://patria-mysql:3306/ms_profile
      SPRING_DATASOURCE_USERNAME: user_profiles
      SPRING_DATASOURCE_PASSWORD: ms.Profiles.1
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - patria-net

volumes:
  mysql-data:

networks:
  patria-net:
    driver: bridge
